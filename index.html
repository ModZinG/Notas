<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Notas</title>
<style>
    :root{
        --bg:#000000;
        --text:#ffffff;
        --muted:rgba(235,235,245,.62);
        --line:rgba(255,255,255,.08);
        --panel:rgba(28,28,30,.92);
        --panel-2:rgba(44,44,46,.92);
        --accent:#ff0aad;
        --accent-2:#ff64e5;
        --danger:#ff453a;
        --shadow:0 18px 50px rgba(0,0,0,.45);
        --transition:650ms cubic-bezier(.22,1,.36,1);
    }

    * { box-sizing: border-box; }

    html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: var(--bg);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        overflow: hidden;
    }

    button, textarea {
        font: inherit;
    }

    .app {
        position: relative;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        background: var(--bg);
    }

    .app::before,
    .app::after {
        content: "";
        position: absolute;
        width: 140vw;
        height: 140vw;
        border-radius: 50%;
        pointer-events: none;
        filter: blur(20px);
        opacity: .65;
        z-index: 0;
        animation: drift 18s ease-in-out infinite alternate;
    }

    .app::before {
        top: -28vw;
        left: -20vw;
        background: radial-gradient(circle, rgba(255, 10, 214, 0.18), transparent 62%);
    }

    .app::after {
        bottom: -34vw;
        right: -18vw;
        background: radial-gradient(circle, rgba(224, 23, 90, 0.12), transparent 64%);
        animation-duration: 24s;
    }

    @keyframes drift {
        from { transform: translate3d(-1.5%, -1.5%, 0) scale(1); }
        to   { transform: translate3d(1.8%, 1.8%, 0) scale(1.1); }
    }

    .view {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        opacity: 0;
        transform: translateX(42px) scale(.965);
        filter: blur(10px);
        pointer-events: none;
        transition:
            opacity var(--transition),
            transform var(--transition),
            filter var(--transition);
        z-index: 1;
    }

    .view.active {
        opacity: 1;
        transform: translateX(0) scale(1);
        filter: blur(0);
        pointer-events: auto;
    }

    .topbar {
        height: 72px;
        padding: 18px 16px 10px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        border-bottom: 1px solid var(--line);
        backdrop-filter: blur(18px);
        -webkit-backdrop-filter: blur(18px);
        background: rgba(0,0,0,.34);
    }

    .top-left {
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .title {
        font-size: 20px;
        font-weight: 700;
        letter-spacing: -.02em;
    }

    .subtitle {
        font-size: 13px;
        color: var(--muted);
        margin-top: 2px;
    }

    .icon-btn {
        border: 0;
        color: var(--text);
        background: var(--panel);
        padding: 10px 14px;
        border-radius: 999px;
        box-shadow: var(--shadow);
        cursor: pointer;
        transition: transform 180ms ease, background 280ms ease, opacity 280ms ease;
        -webkit-tap-highlight-color: transparent;
    }

    .icon-btn:hover { transform: scale(1.02); }
    .icon-btn:active { transform: scale(.98); }

    .icon-btn.ghost { background: rgba(44,44,46,.96); }
    .icon-btn.danger { background: rgba(255, 69, 58, .16); color: #ffd5d2; }

    .content {
        flex: 1;
        min-height: 0;
        padding: 18px 16px 24px;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .menu-card {
        width: min(420px, 100%);
        background: linear-gradient(180deg, rgba(28,28,30,.96), rgba(18,18,20,.96));
        border: 1px solid rgba(255,255,255,.08);
        border-radius: 30px;
        padding: 22px;
        box-shadow: var(--shadow);
        backdrop-filter: blur(18px);
        -webkit-backdrop-filter: blur(18px);
        animation: pop 900ms cubic-bezier(.22,1,.36,1);
    }

    @keyframes pop {
        from { transform: translateY(20px) scale(.965); opacity: 0; }
        to { transform: translateY(0) scale(1); opacity: 1; }
    }

    .menu-head {
        margin-bottom: 18px;
    }

    .menu-head h1 {
        margin: 0;
        font-size: 28px;
        letter-spacing: -.04em;
    }

    .menu-head p {
        margin: 6px 0 0;
        color: var(--muted);
        line-height: 1.4;
        font-size: 14px;
    }

    .menu-actions {
        display: grid;
        gap: 12px;
    }

    .big-btn {
        width: 100%;
        border: 0;
        color: white;
        border-radius: 22px;
        padding: 16px 18px;
        font-size: 17px;
        font-weight: 700;
        cursor: pointer;
        transition: transform 180ms ease, filter 280ms ease, opacity 280ms ease;
        box-shadow: var(--shadow);
        -webkit-tap-highlight-color: transparent;
    }

    .big-btn:active { transform: scale(.985); }

    .big-btn.new {
        background: linear-gradient(180deg, rgb(143, 5, 63), rgb(255, 0, 200));
        box-shadow:
            0 12px 28px rgba(255, 0, 200, .24),
            0 0 0 1px rgba(255,255,255,.06) inset;
    }

    .big-btn.history {
        background: rgba(44,44,46,.96);
        border: 1px solid rgba(255,255,255,.07);
    }

    .history-wrap {
        width: min(760px, 100%);
        height: 100%;
        display: flex;
        flex-direction: column;
        min-height: 0;
    }

    .history-list {
        flex: 1;
        min-height: 0;
        overflow: auto;
        padding: 8px 0 10px;
        overscroll-behavior: contain;
    }

    .note-item {
        position: relative;
        margin-bottom: 12px;
        border-radius: 22px;
        overflow: hidden;
        box-shadow: var(--shadow);
        cursor: pointer;
        touch-action: pan-y;
        user-select: none;
        -webkit-user-select: none;
        animation: rise 650ms cubic-bezier(.22,1,.36,1);
    }

    @keyframes rise {
        from { transform: translateY(10px); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
    }

    .swipe-bg {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: flex-end;
        padding-right: 18px;
        background: linear-gradient(90deg, rgba(255, 59, 48, .18), rgba(255, 59, 48, .95));
        color: rgba(255,255,255,.95);
        font-size: 13px;
        font-weight: 700;
        letter-spacing: -.01em;
    }

    .note-surface {
        position: relative;
        z-index: 1;
        display: flex;
        flex-direction: column;
        gap: 6px;
        padding: 15px 16px;
        background: linear-gradient(180deg, rgba(28,28,30,.98), rgba(22,22,24,.98));
        border: 1px solid rgba(255,255,255,.07);
        transition:
            transform 280ms cubic-bezier(.22,1,.36,1),
            opacity 280ms cubic-bezier(.22,1,.36,1),
            filter 280ms cubic-bezier(.22,1,.36,1);
        will-change: transform, opacity;
    }

    .note-item.dragging .note-surface {
        transition: none;
    }

    .note-item.removing .note-surface {
        opacity: 0;
        transform: translateX(-110%) scale(.98);
        filter: blur(4px);
    }

    .note-title {
        font-size: 16px;
        font-weight: 700;
        letter-spacing: -.02em;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }

    .note-meta {
        font-size: 12px;
        color: var(--muted);
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
    }

    .empty-state {
        width: 100%;
        margin-top: 32px;
        padding: 24px;
        border-radius: 24px;
        text-align: center;
        color: var(--muted);
        border: 1px dashed rgba(255,255,255,.12);
        background: rgba(255,255,255,.03);
    }

    .editor-wrap {
        width: min(920px, 100%);
        height: 100%;
        display: flex;
        flex-direction: column;
        min-height: 0;
    }

    .editor-body {
        flex: 1;
        min-height: 0;
        display: flex;
        flex-direction: column;
        padding-top: 12px;
    }

    .editor-box {
        flex: 1;
        min-height: 0;
        width: 100%;
        border: 0;
        outline: none;
        resize: none;
        color: var(--text);
        background: transparent;
        padding: 6px 4px 16px;
        font-size: 17px;
        line-height: 1.55;
        letter-spacing: -.01em;
        caret-color: var(--accent-2);
    }

    .editor-box::placeholder {
        color: rgba(235,235,245,.34);
    }

    .editor-actions {
        display: flex;
        justify-content: center;
        padding: 8px 0 10px;
    }

    .editor-foot {
        display: flex;
        gap: 10px;
        align-items: center;
        justify-content: space-between;
        padding-top: 10px;
        border-top: 1px solid var(--line);
        color: var(--muted);
        font-size: 12px;
    }

    .status {
        display: inline-flex;
        align-items: center;
        gap: 8px;
    }

    .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #2ee66b;
        box-shadow: 0 0 0 6px rgba(46,230,107,.10);
        opacity: 0;
        transform: scale(.8);
        transition: opacity 260ms ease, transform 260ms ease;
    }

    .dot.show {
        opacity: 1;
        transform: scale(1);
    }

    .tiny {
        color: var(--muted);
    }

    .back-bottom {
        background: rgba(44,44,46,.96);
        border: 1px solid rgba(255,255,255,.07);
        padding: 12px 26px;
        border-radius: 20px;
        box-shadow: var(--shadow);
    }

    .toolbar {
        display: flex;
        gap: 10px;
        align-items: center;
    }

    .back-row {
        display: flex;
        align-items: center;
        gap: 10px;
    }

    @media (max-width: 560px) {
        .topbar { height: 68px; padding: 14px 12px 10px; }
        .title { font-size: 18px; }
        .menu-card { padding: 18px; border-radius: 26px; }
        .menu-head h1 { font-size: 24px; }
        .big-btn { padding: 15px 16px; }
        .note-surface { padding: 14px 14px; border-radius: 20px; }
        .editor-box { font-size: 16px; }
    }

    .history-list::-webkit-scrollbar {
        width: 8px;
    }

    .history-list::-webkit-scrollbar-thumb {
        background: rgba(255,255,255,.14);
        border-radius: 10px;
    }

    .history-list::-webkit-scrollbar-track {
        background: transparent;
    }
</style>
</head>
<body>
<div class="app">

    <section class="view active" id="menuView">
        <div class="content">
            <div class="menu-card">
                <div class="menu-head">
                    <h1>Hola Ángel</h1>
                    <p>¿Qué idea tenemos hoy en mente?</p>
                </div>

                <div class="menu-actions">
                    <button class="big-btn new" id="newBtn">Nueva</button>
                    <button class="big-btn history" id="historyBtn">Historial</button>
                </div>
            </div>
        </div>
    </section>

    <section class="view" id="historyView">
        <div class="topbar">
            <div class="top-left">
                <button class="icon-btn ghost" id="backFromHistory">Volver</button>
                <div>
                    <div class="title">Historial</div>
                    <div class="subtitle" id="historyCount">0 notas guardadas</div>
                </div>
            </div>
            <div class="toolbar">
                <button class="icon-btn danger" id="deleteAllBtn" title="Borrar todo">Borrar todo</button>
            </div>
        </div>

        <div class="content">
            <div class="history-wrap">
                <div class="history-list" id="historyList"></div>
            </div>
        </div>
    </section>

    <section class="view" id="editorView">
        <div class="topbar">
            <div class="top-left">
                <div>
                    <div class="title" id="editorTitle">Nueva nota</div>
                    <div class="subtitle" id="editorSubtitle">Se guarda al salir o al crear otra</div>
                </div>
            </div>
            <div style="width: 40px;"></div>
        </div>

        <div class="content">
            <div class="editor-wrap">
                <div class="editor-body">
                    <textarea
                        class="editor-box"
                        id="noteText"
                        placeholder="Escribe tu nota..."
                        spellcheck="false"></textarea>
                </div>

                <div class="editor-actions">
                    <button class="icon-btn back-bottom" id="backBottom">Volver</button>
                </div>

                <div class="editor-foot">
                    <div class="status">
                        <span class="dot" id="savedDot"></span>
                        <span id="saveState">Listo</span>
                    </div>
                    <div class="tiny" id="noteDate"></div>
                </div>
            </div>
        </div>
    </section>

</div>

<script>
(() => {
    const STORAGE_KEY = "minimal_notes_ios";

    const menuView = document.getElementById("menuView");
    const historyView = document.getElementById("historyView");
    const editorView = document.getElementById("editorView");

    const newBtn = document.getElementById("newBtn");
    const historyBtn = document.getElementById("historyBtn");
    const backFromHistory = document.getElementById("backFromHistory");
    const backBottom = document.getElementById("backBottom");
    const deleteAllBtn = document.getElementById("deleteAllBtn");

    const historyList = document.getElementById("historyList");
    const historyCount = document.getElementById("historyCount");
    const noteText = document.getElementById("noteText");
    const editorTitle = document.getElementById("editorTitle");
    const editorSubtitle = document.getElementById("editorSubtitle");
    const noteDate = document.getElementById("noteDate");
    const saveState = document.getElementById("saveState");
    const savedDot = document.getElementById("savedDot");

    let notes = loadNotes();
    let currentId = null;
    let currentView = "menu";
    let dirty = false;

    function loadNotes() {
        try {
            const raw = localStorage.getItem(STORAGE_KEY);
            const parsed = raw ? JSON.parse(raw) : [];
            return Array.isArray(parsed) ? parsed : [];
        } catch {
            return [];
        }
    }

    function persistNotes() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(notes));
    }

    function nowStamp() {
        return new Date().toLocaleString("es-MX", {
            dateStyle: "medium",
            timeStyle: "short"
        });
    }

    function noteTitle(text) {
        const lines = String(text || "").replace(/\r/g, "").split("\n");
        const first = (lines[0] || "").trim();
        return first || "Sin título";
    }

    function escapeHTML(str) {
        return String(str)
            .replaceAll("&", "&amp;")
            .replaceAll("<", "&lt;")
            .replaceAll(">", "&gt;")
            .replaceAll('"', "&quot;")
            .replaceAll("'", "&#39;");
    }

    function setView(viewName) {
        currentView = viewName;
        menuView.classList.toggle("active", viewName === "menu");
        historyView.classList.toggle("active", viewName === "history");
        editorView.classList.toggle("active", viewName === "editor");
    }

    function pulseSaved() {
        saveState.textContent = "Guardado";
        savedDot.classList.add("show");

        clearTimeout(pulseSaved._t);
        pulseSaved._t = setTimeout(() => {
            saveState.textContent = dirty ? "Editando..." : "Listo";
            savedDot.classList.remove("show");
        }, 1000);
    }

    function markDirty() {
        dirty = true;
        saveState.textContent = "Editando...";
        savedDot.classList.remove("show");
    }

    function getCurrentIndex() {
        return notes.findIndex(n => n.id === currentId);
    }

    function saveCurrentNote() {
        const text = noteText.value.replace(/\s+$/, "");
        const trimmed = text.trim();

        if (currentId === null && trimmed === "") {
            dirty = false;
            saveState.textContent = "Listo";
            return false;
        }

        const timestamp = nowStamp();

        const existingIndex = getCurrentIndex();
        const previousCreatedAt = existingIndex !== -1 ? notes[existingIndex].createdAt : timestamp;

        const payload = {
            id: currentId || String(Date.now()) + Math.random().toString(16).slice(2),
            content: text,
            title: noteTitle(text),
            createdAt: previousCreatedAt,
            updatedAt: timestamp
        };

        if (currentId && existingIndex !== -1) {
            notes[existingIndex] = payload;
        } else {
            notes.unshift(payload);
            currentId = payload.id;
        }

        notes.sort((a, b) => new Date(b.updatedAt) - new Date(a.updatedAt));
        persistNotes();
        dirty = false;
        noteDate.textContent = `Actualizada: ${payload.updatedAt}`;
        pulseSaved();
        return true;
    }

    function openNewNote() {
        if (currentView === "editor" && dirty) saveCurrentNote();

        currentId = null;
        noteText.value = "";
        editorTitle.textContent = "Nueva nota";
        editorSubtitle.textContent = "La primera línea será el título";
        noteDate.textContent = "";
        dirty = false;
        saveState.textContent = "Listo";
        savedDot.classList.remove("show");

        setView("editor");
        setTimeout(() => noteText.focus(), 50);
    }

    function openHistory() {
        if (currentView === "editor" && dirty) saveCurrentNote();
        renderHistory();
        setView("history");
    }

    function openNote(id) {
        if (currentView === "editor" && dirty) saveCurrentNote();

        const note = notes.find(n => n.id === id);
        if (!note) return;

        currentId = note.id;
        noteText.value = note.content || "";
        editorTitle.textContent = note.title || "Sin título";
        editorSubtitle.textContent = "Edita tu nota y vuelve cuando termines";
        noteDate.textContent = `Creada: ${note.createdAt} · Actualizada: ${note.updatedAt}`;
        dirty = false;
        saveState.textContent = "Listo";
        savedDot.classList.remove("show");

        setView("editor");
        setTimeout(() => noteText.focus(), 50);
    }

    function vibrateDelete() {
        try {
            if (navigator.vibrate) {
                navigator.vibrate([18, 32, 18]);
            }
        } catch {}
    }

    function deleteNoteAnimated(id, itemEl) {
        const index = notes.findIndex(n => n.id === id);
        if (index === -1) return;

        vibrateDelete();

        if (itemEl) {
            itemEl.classList.add("removing");
        }

        setTimeout(() => {
            const idxNow = notes.findIndex(n => n.id === id);
            if (idxNow !== -1) {
                notes.splice(idxNow, 1);
                persistNotes();
            }

            if (currentId === id) {
                currentId = null;
                dirty = false;
            }

            renderHistory();
        }, 280);
    }

    function attachSwipeHandlers(item, id) {
        const surface = item.querySelector(".note-surface");
        const swipeBg = item.querySelector(".swipe-bg");

        let startX = 0;
        let startY = 0;
        let dx = 0;
        let dy = 0;
        let dragging = false;
        let suppressClick = false;
        let pointerId = null;

        const resetSurface = (animated = true) => {
            if (animated) {
                surface.style.transition = "transform 280ms cubic-bezier(.22,1,.36,1), opacity 280ms cubic-bezier(.22,1,.36,1), filter 280ms cubic-bezier(.22,1,.36,1)";
            } else {
                surface.style.transition = "none";
            }
            surface.style.transform = "translateX(0px)";
            swipeBg.style.opacity = "0";
            item.classList.remove("dragging");
        };

        item.addEventListener("pointerdown", (e) => {
            if (e.button !== 0) return;

            pointerId = e.pointerId;
            startX = e.clientX;
            startY = e.clientY;
            dx = 0;
            dy = 0;
            dragging = false;
            suppressClick = false;
            item.classList.add("dragging");
            surface.style.transition = "none";

            try { item.setPointerCapture(pointerId); } catch {}
        });

        item.addEventListener("pointermove", (e) => {
            if (pointerId !== e.pointerId) return;
            dx = e.clientX - startX;
            dy = e.clientY - startY;

            if (!dragging) {
                if (Math.abs(dx) > 7 && Math.abs(dx) > Math.abs(dy)) {
                    dragging = true;
                } else {
                    return;
                }
            }

            if (!dragging) return;

            if (dx > 0) dx = 0;

            let translate = dx;

            if (translate < -180) {
                translate = -180 - ((Math.abs(translate) - 180) * 0.14);
            }

            surface.style.transform = `translateX(${translate}px)`;
            const progress = Math.min(1, Math.abs(translate) / 140);
            swipeBg.style.opacity = String(Math.max(0, progress * 0.95));

            if (Math.abs(translate) > 100 && !item.dataset.hapticed) {
                item.dataset.hapticed = "1";
                try {
                    if (navigator.vibrate) navigator.vibrate(10);
                } catch {}
            }

            if (Math.abs(translate) <= 100) {
                delete item.dataset.hapticed;
            }
        });

        const finishPointer = (e) => {
            if (pointerId !== e.pointerId) return;

            try { item.releasePointerCapture(pointerId); } catch {}
            pointerId = null;

            if (!dragging) {
                item.classList.remove("dragging");
                surface.style.transition = "transform 280ms cubic-bezier(.22,1,.36,1)";
                return;
            }

            suppressClick = true;
            setTimeout(() => {
                suppressClick = false;
            }, 350);

            if (dx < -120) {
                deleteNoteAnimated(id, item);
            } else {
                resetSurface(true);
            }

            delete item.dataset.hapticed;
        };

        item.addEventListener("pointerup", finishPointer);
        item.addEventListener("pointercancel", finishPointer);

        item.addEventListener("click", (e) => {
            if (suppressClick || item.classList.contains("removing")) {
                e.preventDefault();
                e.stopPropagation();
                return;
            }
            openNote(id);
        });
    }

    function renderHistory() {
        notes = loadNotes().sort((a, b) => new Date(b.updatedAt) - new Date(a.updatedAt));

        const count = notes.length;
        historyCount.textContent = count === 1 ? "1 nota guardada" : `${count} notas guardadas`;

        if (!count) {
            historyList.innerHTML = `
                <div class="empty-state">
                    No hay notas todavía. Dale a “Nueva” y empieza tu cuaderno digital.
                </div>
            `;
            return;
        }

        historyList.innerHTML = notes.map((n) => `
            <div class="note-item" data-id="${escapeHTML(n.id)}">
                <div class="swipe-bg">Desliza para borrar</div>
                <div class="note-surface">
                    <div class="note-title">${escapeHTML(n.title || "Sin título")}</div>
                    <div class="note-meta">
                        <span>${escapeHTML(n.updatedAt || n.createdAt || "")}</span>
                        <span>•</span>
                        <span>${escapeHTML((n.content || "").split("\n").length + " línea(s)")}</span>
                    </div>
                </div>
            </div>
        `).join("");

        historyList.querySelectorAll(".note-item").forEach(item => {
            const id = item.dataset.id;
            attachSwipeHandlers(item, id);
        });
    }

    function deleteAllNotes() {
        const ok = confirm("¿Borrar todas las notas?");
        if (!ok) return;

        notes = [];
        currentId = null;
        dirty = false;
        persistNotes();
        renderHistory();

        if (currentView === "editor") {
            noteText.value = "";
            editorTitle.textContent = "Nueva nota";
            editorSubtitle.textContent = "La primera línea será el título";
            noteDate.textContent = "";
            saveState.textContent = "Listo";
            savedDot.classList.remove("show");
        }
    }

    newBtn.addEventListener("click", openNewNote);
    historyBtn.addEventListener("click", openHistory);
    backFromHistory.addEventListener("click", () => setView("menu"));

    backBottom.addEventListener("click", () => {
        if (dirty) saveCurrentNote();
        setView("menu");
    });

    deleteAllBtn.addEventListener("click", deleteAllNotes);

    noteText.addEventListener("input", () => {
        markDirty();
    });

    window.addEventListener("beforeunload", () => {
        if (currentView === "editor" && dirty) saveCurrentNote();
    });

    renderHistory();
})();
</script>
</body>
</html>
